<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sketch Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #222;
      font-size: 13px;
      color: #555;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header span { color: #e0e0e0 }
    header a { color: #555; text-decoration: none; font-size: 11px }
    header a:hover { color: #e0e0e0 }

    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left panel ── */
    .left {
      width: 280px;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sketch-list {
      flex: 1;
      overflow-y: auto;
    }

    .section-header {
      padding: 10px 16px 6px;
      font-size: 10px;
      color: #444;
      letter-spacing: 0.12em;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: #0d0d0d;
      z-index: 1;
    }

    .add-btn {
      background: none;
      border: none;
      color: #444;
      font-family: inherit;
      font-size: 16px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    .add-btn:hover { color: #e0e0e0 }

    .sketch-item {
      padding: 10px 16px;
      border-bottom: 1px solid #151515;
      cursor: pointer;
      transition: background 0.1s;
    }

    .sketch-item:hover { background: #141414 }
    .sketch-item.active { background: #1a1a1a; border-left: 2px solid #e0e0e0 }

    .sketch-name { font-size: 12px; color: #ccc; margin-bottom: 3px }
    .sketch-mood { font-size: 10px; color: #444; white-space: nowrap; overflow: hidden; text-overflow: ellipsis }

    .sketch-item { position: relative }
    .delete-btn {
      display: none;
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #555;
      font-size: 14px;
      cursor: pointer;
      padding: 2px 4px;
      line-height: 1;
    }
    .sketch-item:hover .delete-btn { display: block }
    .delete-btn:hover { color: #c0392b }

    .empty-group {
      padding: 12px 16px;
      font-size: 11px;
      color: #333;
      font-style: italic;
    }

    /* ── Add form ── */
    .add-form {
      display: none;
      border-top: 1px solid #222;
      padding: 12px 16px;
      flex-direction: column;
      gap: 8px;
      background: #0d0d0d;
    }

    .add-form.open { display: flex }

    .add-form-title {
      font-size: 10px;
      color: #555;
      letter-spacing: 0.1em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .add-form-title button {
      background: none;
      border: none;
      color: #444;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }

    .add-form-title button:hover { color: #e0e0e0 }

    .add-form input, .add-form textarea {
      width: 100%;
      background: #111;
      color: #e0e0e0;
      border: 1px solid #2a2a2a;
      border-radius: 3px;
      padding: 7px 10px;
      font-family: inherit;
      font-size: 11px;
      outline: none;
    }

    .add-form textarea { height: 100px; resize: none; line-height: 1.4 }
    .add-form input:focus, .add-form textarea:focus { border-color: #444 }

    .source-toggle {
      display: flex;
      gap: 6px;
    }

    .src-btn {
      flex: 1;
      padding: 5px;
      background: #1a1a1a;
      color: #555;
      border: 1px solid #2a2a2a;
      border-radius: 3px;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.08em;
      cursor: pointer;
    }

    .src-btn.active { background: #e0e0e0; color: #0d0d0d; border-color: #e0e0e0 }

    .save-btn {
      padding: 7px;
      background: #e0e0e0;
      color: #0d0d0d;
      border: none;
      border-radius: 3px;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.05em;
      cursor: pointer;
    }

    .save-btn:hover { background: #fff }
    .save-btn:disabled { background: #333; color: #555; cursor: not-allowed }

    .form-status { font-size: 10px; color: #555; min-height: 14px }

    /* ── Right panel ── */
    .right {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preview-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080808;
      min-height: 0;
    }

    iframe {
      width: 500px;
      height: 500px;
      border: 1px solid #1a1a1a;
      background: #000;
    }

    .placeholder { color: #2a2a2a; font-size: 12px; letter-spacing: 0.1em }

    .code-panel {
      height: 180px;
      border-top: 1px solid #222;
      display: flex;
      flex-direction: column;
    }

    .code-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px;
      border-bottom: 1px solid #1a1a1a;
      font-size: 10px;
      color: #444;
      letter-spacing: 0.1em;
      flex-shrink: 0;
    }

    .code-panel-header span { color: #666 }

    textarea#code-view {
      flex: 1;
      background: #0a0a0a;
      color: #666;
      border: none;
      padding: 12px 16px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      resize: none;
      outline: none;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <header>
    <span>sketch gallery</span>
    <a href="/">← back to agent</a>
  </header>

  <div class="workspace">
    <div class="left">
      <div class="sketch-list" id="sketch-list">
        <div class="section-header">LOADING...</div>
      </div>

      <!-- 添加表单，固定在左侧底部 -->
      <div class="add-form" id="add-form">
        <div class="add-form-title">
          <span id="form-label">ADD SKETCH</span>
          <button onclick="closeForm()">✕</button>
        </div>
        <div class="source-toggle">
          <button class="src-btn active" id="src-own" onclick="setSource('own')">MY WORK</button>
          <button class="src-btn" id="src-collected" onclick="setSource('collected')">COLLECTED</button>
        </div>
        <input id="add-name" placeholder="name (e.g. noise-field)" />
        <textarea id="add-code" placeholder="paste p5.js code here..."></textarea>
        <button class="save-btn" id="save-btn" onclick="saveSketch()">SAVE + REBUILD INDEX</button>
        <div class="form-status" id="form-status"></div>
      </div>
    </div>

    <div class="right">
      <div class="preview-area">
        <iframe id="preview" sandbox="allow-scripts"></iframe>
        <div class="placeholder" id="placeholder">select a sketch to preview</div>
      </div>
      <div class="code-panel">
        <div class="code-panel-header">
          <div>SOURCE</div>
          <span id="code-label">—</span>
        </div>
        <textarea id="code-view" readonly placeholder="// code will appear here"></textarea>
      </div>
    </div>
  </div>

  <script>
    let allSketches = {}
    let addSource = 'own'

    async function loadSketches() {
      const res = await fetch('/api/sketches')
      allSketches = await res.json()
      renderList()
    }

    function renderList() {
      const list = document.getElementById('sketch-list')
      list.innerHTML = ''

      const sections = [
        { key: 'own', label: 'MY WORK' },
        { key: 'collected', label: 'COLLECTED' }
      ]

      for (const { key, label } of sections) {
        const items = allSketches[key] || []

        const header = document.createElement('div')
        header.className = 'section-header'
        header.innerHTML = `
          <span>${label} (${items.length})</span>
          <button class="add-btn" onclick="openForm('${key}')" title="Add to ${label}">+</button>
        `
        list.appendChild(header)

        if (items.length === 0) {
          const empty = document.createElement('div')
          empty.className = 'empty-group'
          empty.textContent = key === 'own' ? 'no sketches yet — click + to add' : 'nothing collected yet — click + to add'
          list.appendChild(empty)
          continue
        }

        for (const sketch of items) {
          const item = document.createElement('div')
          item.className = 'sketch-item'
          item.innerHTML = `
            <div class="sketch-name">${sketch.title || sketch.name}</div>
            <div class="sketch-mood">${sketch.mood || sketch.name}</div>
            <button class="delete-btn" title="Delete">✕</button>
          `
          item.querySelector('.delete-btn').onclick = (e) => {
            e.stopPropagation()
            deleteSketch(sketch.name, item)
          }
          item.onclick = () => selectSketch(sketch, item)
          list.appendChild(item)
        }
      }
    }

    function openForm(source) {
      addSource = source
      setSource(source)
      document.getElementById('add-form').classList.add('open')
      document.getElementById('add-name').focus()
    }

    function closeForm() {
      document.getElementById('add-form').classList.remove('open')
      document.getElementById('form-status').textContent = ''
    }

    function setSource(src) {
      addSource = src
      document.getElementById('src-own').classList.toggle('active', src === 'own')
      document.getElementById('src-collected').classList.toggle('active', src === 'collected')
    }

    async function saveSketch() {
      const name = document.getElementById('add-name').value.trim()
      const code = document.getElementById('add-code').value.trim()
      const status = document.getElementById('form-status')
      const btn = document.getElementById('save-btn')
      if (!name || !code) { status.textContent = 'name and code required'; return }

      btn.disabled = true
      status.textContent = 'saving + rebuilding...'

      try {
        const res = await fetch('/api/save-sketch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, code, source: addSource })
        })
        const data = await res.json()
        if (data.error) throw new Error(data.error)

        status.textContent = `saved — ${data.total} sketches in library`
        document.getElementById('add-name').value = ''
        document.getElementById('add-code').value = ''

        await loadSketches()
      } catch (err) {
        status.textContent = 'error: ' + err.message
      } finally {
        btn.disabled = false
      }
    }

    async function selectSketch(sketch, el) {
      document.querySelectorAll('.sketch-item').forEach(i => i.classList.remove('active'))
      el.classList.add('active')

      const res = await fetch(`/sketches/${sketch.file}`)
      const code = await res.text()

      document.getElementById('code-view').value = code
      document.getElementById('code-label').textContent = sketch.file

      document.getElementById('placeholder').style.display = 'none'
      const html = `<!DOCTYPE html>
<html>
<head><style>* { margin:0; padding:0 } canvas { display:block }</style></head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"><\/script>
  <script>${code}<\/script>
</body>
</html>`
      const blob = new Blob([html], { type: 'text/html' })
      document.getElementById('preview').src = URL.createObjectURL(blob)
    }

    loadSketches()
  </script>
</body>
</html>
