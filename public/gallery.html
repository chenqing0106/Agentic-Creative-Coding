<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sketch Gallery</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- CodeMirror 5 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/monokai.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>

  <style>
    :root {
      --bg: #0d0d0d;
      --bg-deep: #080808;
      --bg-input: #111;
      --bg-elevated: #1a1a1a;
      --border: #222;
      --border-soft: #1a1a1a;
      --border-input: #2a2a2a;
      --text: #e0e0e0;
      --text-dim: #555;
      --text-muted: #444;
      --text-sub: #666;
      --text-secondary: #ccc;
      --text-hover: #aaa;
      --accent: #e0e0e0;
      --accent-text: #0d0d0d;
      --disabled: #333;
      --disabled-text: #555;
    }

    :root.light {
      --bg: #f5f5f5;
      --bg-deep: #ebebeb;
      --bg-input: #ffffff;
      --bg-elevated: #eeeeee;
      --border: #d5d5d5;
      --border-soft: #e0e0e0;
      --border-input: #cccccc;
      --text: #1a1a1a;
      --text-dim: #888;
      --text-muted: #999;
      --text-sub: #777;
      --text-secondary: #444;
      --text-hover: #333;
      --accent: #1a1a1a;
      --accent-text: #f5f5f5;
      --disabled: #d0d0d0;
      --disabled-text: #aaa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0 }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header span { color: var(--text) }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header a { color: var(--text-dim); text-decoration: none; font-size: 11px }
    header a:hover { color: var(--text) }

    .theme-toggle {
      background: none;
      border: 1px solid var(--border-input);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.1em;
      padding: 3px 8px;
      cursor: pointer;
      border-radius: 3px;
      transition: border-color 0.15s, color 0.15s;
    }

    .theme-toggle:hover { border-color: var(--text-dim); color: var(--text) }

    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left panel ── */
    .left {
      width: 280px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sketch-list {
      flex: 1;
      overflow-y: auto;
    }

    .section-header {
      padding: 10px 16px 6px;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      border-bottom: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 1;
    }

    .add-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 16px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    .add-btn:hover { color: var(--text) }

    .sketch-item {
      padding: 10px 16px;
      border-bottom: 1px solid var(--bg-elevated);
      cursor: pointer;
      transition: background 0.1s;
    }

    .sketch-item:hover { background: var(--bg-elevated) }
    .sketch-item.active { background: var(--bg-elevated); border-left: 2px solid var(--text) }

    .sketch-name { font-size: 12px; color: var(--text-secondary); margin-bottom: 3px }
    .sketch-mood { font-size: 10px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis }

    .sketch-item { position: relative }
    .delete-btn {
      display: none;
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 14px;
      cursor: pointer;
      padding: 2px 4px;
      line-height: 1;
    }
    .sketch-item:hover .delete-btn { display: block }
    .delete-btn:hover { color: #c0392b }

    .empty-group {
      padding: 12px 16px;
      font-size: 11px;
      color: var(--border-input);
      font-style: italic;
    }

    /* ── Add form ── */
    .add-form {
      display: none;
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      flex-direction: column;
      gap: 8px;
      background: var(--bg);
    }

    .add-form.open { display: flex }

    .add-form-title {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .add-form-title button {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      margin: 0;
      padding: 0;
    }

    .add-form-title button:hover { color: var(--text) }

    .add-form input, .add-form textarea {
      width: 100%;
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border-input);
      border-radius: 3px;
      padding: 7px 10px;
      font-family: inherit;
      font-size: 11px;
      outline: none;
    }

    .add-form textarea { height: 100px; resize: none; line-height: 1.4 }
    .add-form input:focus, .add-form textarea:focus { border-color: var(--text-hover) }

    .source-toggle {
      display: flex;
      gap: 6px;
    }

    .src-btn {
      flex: 1;
      padding: 5px;
      background: var(--bg-elevated);
      color: var(--text-dim);
      border: 1px solid var(--border-input);
      border-radius: 3px;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.08em;
      cursor: pointer;
      margin: 0;
    }

    .src-btn.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent) }

    .save-btn {
      padding: 7px;
      background: var(--accent);
      color: var(--accent-text);
      border: none;
      border-radius: 3px;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.05em;
      cursor: pointer;
      margin: 0;
    }

    .save-btn:hover { opacity: 0.85 }
    .save-btn:disabled { background: var(--disabled); color: var(--disabled-text); cursor: not-allowed; opacity: 1 }

    .form-status { font-size: 10px; color: var(--text-dim); min-height: 14px }

    /* ── Right panel ── */
    .right {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preview-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-deep);
      min-height: 0;
      padding: 20px;
      overflow: hidden;
    }

    iframe {
      width: min(calc(100vw - 280px - 40px), calc(100vh - 310px));
      height: min(calc(100vw - 280px - 40px), calc(100vh - 310px));
      border: 1px solid var(--border-soft);
      background: var(--bg);
    }

    .placeholder { color: var(--border-input); font-size: 12px; letter-spacing: 0.1em }

    .code-panel {
      height: 200px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .code-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px;
      border-bottom: 1px solid var(--border-soft);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      flex-shrink: 0;
    }

    .code-panel-header span { color: var(--text-sub) }

    .panel-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .action-btn {
      background: none;
      border: 1px solid var(--border-input);
      color: var(--text-muted);
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      cursor: pointer;
      margin: 0;
      border-radius: 3px;
      display: none;
    }

    .action-btn:hover { border-color: var(--text-dim); color: var(--text); opacity: 1 }

    /* CodeMirror 只读视图 */
    .code-panel .CodeMirror {
      flex: 1;
      height: 100%;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.5;
      border: none;
    }

    :root:not(.light) .code-panel .CodeMirror {
      background: var(--bg-input);
    }

    :root:not(.light) .code-panel .CodeMirror-gutters {
      background: var(--bg);
      border-right: 1px solid var(--border-input);
    }

    :root.light .code-panel .CodeMirror {
      background: var(--bg-input);
      color: var(--text-sub);
    }

    :root.light .code-panel .CodeMirror-gutters {
      background: var(--bg-elevated);
      border-right: 1px solid var(--border-input);
    }

    :root.light .code-panel .CodeMirror-linenumber {
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <header>
    <span>sketch gallery</span>
    <div class="header-right">
      <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()">LIGHT</button>
      <a href="/">← back to agent</a>
    </div>
  </header>

  <div class="workspace">
    <div class="left">
      <div class="sketch-list" id="sketch-list">
        <div class="section-header">LOADING...</div>
      </div>

      <div class="add-form" id="add-form">
        <div class="add-form-title">
          <span id="form-label">ADD SKETCH</span>
          <button onclick="closeForm()">✕</button>
        </div>
        <div class="source-toggle">
          <button class="src-btn active" id="src-own" onclick="setSource('own')">MY WORK</button>
          <button class="src-btn" id="src-collected" onclick="setSource('collected')">COLLECTED</button>
        </div>
        <input id="add-name" placeholder="name (e.g. noise-field)" />
        <textarea id="add-code" placeholder="paste p5.js code here..."></textarea>
        <button class="save-btn" id="save-btn" onclick="saveSketch()">SAVE + REBUILD INDEX</button>
        <div class="form-status" id="form-status"></div>
      </div>
    </div>

    <div class="right">
      <div class="preview-area">
        <iframe id="preview" sandbox="allow-scripts"></iframe>
        <div class="placeholder" id="placeholder">select a sketch to preview</div>
      </div>
      <div class="code-panel">
        <div class="code-panel-header">
          <div>SOURCE <span id="code-label">—</span></div>
          <div class="panel-actions">
            <button class="action-btn" id="critic-btn" onclick="sendToCritic()">SEND TO CRITIC →</button>
          </div>
        </div>
        <textarea id="code-view" readonly placeholder="// code will appear here"></textarea>
      </div>
    </div>
  </div>

  <script>
    let allSketches = {}
    let addSource = 'own'

    // ── Theme ──────────────────────────────────────────────
    function applyTheme(light) {
      document.documentElement.classList.toggle('light', light)
      document.getElementById('theme-btn').textContent = light ? 'DARK' : 'LIGHT'
      if (codeViewer) {
        codeViewer.setOption('theme', light ? 'default' : 'monokai')
      }
    }

    function toggleTheme() {
      const nowLight = !document.documentElement.classList.contains('light')
      localStorage.setItem('theme', nowLight ? 'light' : 'dark')
      applyTheme(nowLight)
    }

    // ── Sketches ───────────────────────────────────────────
    async function loadSketches() {
      const res = await fetch('/api/sketches')
      allSketches = await res.json()
      renderList()
    }

    function renderList() {
      const list = document.getElementById('sketch-list')
      list.innerHTML = ''

      const sections = [
        { key: 'own', label: 'MY WORK' },
        { key: 'collected', label: 'COLLECTED' }
      ]

      for (const { key, label } of sections) {
        const items = allSketches[key] || []

        const header = document.createElement('div')
        header.className = 'section-header'
        header.innerHTML = `
          <span>${label} (${items.length})</span>
          <button class="add-btn" onclick="openForm('${key}')" title="Add to ${label}">+</button>
        `
        list.appendChild(header)

        if (items.length === 0) {
          const empty = document.createElement('div')
          empty.className = 'empty-group'
          empty.textContent = key === 'own' ? 'no sketches yet — click + to add' : 'nothing collected yet — click + to add'
          list.appendChild(empty)
          continue
        }

        for (const sketch of items) {
          const item = document.createElement('div')
          item.className = 'sketch-item'
          item.innerHTML = `
            <div class="sketch-name">${sketch.title || sketch.name}</div>
            <div class="sketch-mood">${sketch.mood || sketch.name}</div>
            <button class="delete-btn" title="Delete">✕</button>
          `
          item.querySelector('.delete-btn').onclick = (e) => {
            e.stopPropagation()
            deleteSketch(sketch.name, item)
          }
          item.onclick = () => selectSketch(sketch, item)
          list.appendChild(item)
        }
      }
    }

    function openForm(source) {
      addSource = source
      setSource(source)
      document.getElementById('add-form').classList.add('open')
      document.getElementById('add-name').focus()
    }

    function closeForm() {
      document.getElementById('add-form').classList.remove('open')
      document.getElementById('form-status').textContent = ''
    }

    function setSource(src) {
      addSource = src
      document.getElementById('src-own').classList.toggle('active', src === 'own')
      document.getElementById('src-collected').classList.toggle('active', src === 'collected')
    }

    async function saveSketch() {
      const name = document.getElementById('add-name').value.trim()
      const code = document.getElementById('add-code').value.trim()
      const status = document.getElementById('form-status')
      const btn = document.getElementById('save-btn')
      if (!name || !code) { status.textContent = 'name and code required'; return }

      btn.disabled = true
      status.textContent = 'saving + rebuilding...'

      try {
        const res = await fetch('/api/save-sketch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, code, source: addSource })
        })
        const data = await res.json()
        if (data.error) throw new Error(data.error)

        status.textContent = `saved — ${data.total} sketches in library`
        document.getElementById('add-name').value = ''
        document.getElementById('add-code').value = ''

        await loadSketches()
      } catch (err) {
        status.textContent = 'error: ' + err.message
      } finally {
        btn.disabled = false
      }
    }

    async function deleteSketch(name, el) {
      if (!confirm(`Delete "${name}"?`)) return
      el.style.opacity = '0.4'
      try {
        const res = await fetch(`/api/sketches/${name}`, { method: 'DELETE' })
        const data = await res.json()
        if (data.error) throw new Error(data.error)
        await loadSketches()
      } catch (err) {
        el.style.opacity = '1'
        alert('Error: ' + err.message)
      }
    }

    let selectedSketch = null

    async function selectSketch(sketch, el) {
      document.querySelectorAll('.sketch-item').forEach(i => i.classList.remove('active'))
      el.classList.add('active')

      const res = await fetch(`/sketches/${sketch.file}`)
      const code = await res.text()
      selectedSketch = { code, filename: sketch.file }

      codeViewer.setValue(code)
      document.getElementById('code-label').textContent = sketch.file
      document.getElementById('critic-btn').style.display = 'block'

      document.getElementById('placeholder').style.display = 'none'
      const html = `<!DOCTYPE html>
<html>
<head><style>* { margin:0; padding:0 } canvas { display:block }</style></head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"><\/script>
  <script>${code}<\/script>
</body>
</html>`
      const blob = new Blob([html], { type: 'text/html' })
      document.getElementById('preview').src = URL.createObjectURL(blob)
    }

    function sendToCritic() {
      if (!selectedSketch) return
      localStorage.setItem('pendingCritic', JSON.stringify(selectedSketch))
      window.location.href = '/'
    }

    // ── Init ───────────────────────────────────────────────
    const savedTheme = localStorage.getItem('theme')
    const startLight = savedTheme === 'light'

    const codeViewer = CodeMirror.fromTextArea(document.getElementById('code-view'), {
      mode: 'javascript',
      theme: startLight ? 'default' : 'monokai',
      lineNumbers: true,
      readOnly: true,
      tabSize: 2,
    })

    applyTheme(startLight)
    loadSketches()
  </script>
</body>
</html>
